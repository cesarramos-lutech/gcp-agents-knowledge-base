project: ai-future-data-agents
dataset: look_ecommerce

tables:
  distribution_centers:
    description: Warehouse and distribution center locations for The Look e-commerce store
    columns:
      id: Unique distribution center identifier
      name: Name of the distribution center
      latitude: Geographic latitude of the center
      longitude: Geographic longitude of the center
      distribution_center_geom: Geographic point geometry of the center location

  events:
    description: Web events (page views, clicks, etc.) generated by users browsing the store
    columns:
      id: Unique event identifier
      user_id: User who triggered the event (foreign key to users.id)
      sequence_number: Order of this event within the user's session
      session_id: Browser session identifier
      created_at: Timestamp when the event occurred
      ip_address: IP address of the user
      city: City of the user
      state: State or region of the user
      postal_code: Postal code of the user
      browser: Browser used (e.g. Chrome, Safari, Firefox)
      traffic_source: How the user arrived (e.g. Organic, Email, Adwords)
      uri: Page URL that was visited
      event_type: "Type of event (e.g. page, purchase, cart, cancel)"

  inventory_items:
    description: Individual inventory units — each row is one physical item in stock or sold
    columns:
      id: Unique inventory item identifier
      product_id: Product this item belongs to (foreign key to products.id)
      created_at: Timestamp when the item was added to inventory
      sold_at: Timestamp when the item was sold (null if unsold)
      cost: Cost to acquire this inventory item
      product_category: Category of the product
      product_name: Name of the product
      product_brand: Brand of the product
      product_retail_price: Retail price of the product
      product_department: Department (e.g. Mens, Womens)
      product_sku: Stock keeping unit identifier
      product_distribution_center_id: Distribution center where this item is stored (foreign key to distribution_centers.id)

  order_items:
    description: Individual line items within orders — each row is one product in one order
    columns:
      id: Unique order item identifier
      order_id: Order this item belongs to (foreign key to orders.order_id)
      user_id: Customer who placed the order (foreign key to users.id)
      product_id: Product purchased (foreign key to products.id)
      inventory_item_id: Specific inventory unit fulfilled (foreign key to inventory_items.id)
      status: "Item status (complete, returned, cancelled, processing, shipped)"
      created_at: Timestamp when the order item was created
      shipped_at: Timestamp when the item was shipped
      delivered_at: Timestamp when the item was delivered
      returned_at: Timestamp when the item was returned (null if not returned)
      sale_price: Actual price paid by the customer for this item

  orders:
    description: Customer orders — each row is one order containing one or more items
    columns:
      order_id: Unique order identifier
      user_id: Customer who placed the order (foreign key to users.id)
      status: "Order status (complete, returned, cancelled, processing, shipped)"
      gender: Gender of the customer at time of order
      created_at: Timestamp when the order was placed
      returned_at: Timestamp when the order was returned (null if not returned)
      shipped_at: Timestamp when the order was shipped
      delivered_at: Timestamp when the order was delivered
      num_of_item: Number of items in the order

  products:
    description: Product catalog for The Look e-commerce store
    columns:
      id: Unique product identifier
      cost: Cost to the business for this product
      category: Product category (e.g. Jeans, Tops & Tees, Outerwear)
      name: Product name
      brand: Brand name
      retail_price: Listed retail price
      department: Department (e.g. Mens, Womens)
      sku: Stock keeping unit identifier
      distribution_center_id: Primary distribution center for this product (foreign key to distribution_centers.id)

  users:
    description: Registered customers of The Look e-commerce store
    columns:
      id: Unique user identifier
      first_name: User's first name
      last_name: User's last name
      email: User's email address
      age: User's age
      gender: User's gender
      state: State or region of the user
      street_address: Street address
      postal_code: Postal code
      city: City
      country: Country
      latitude: Geographic latitude of the user's address
      longitude: Geographic longitude of the user's address
      traffic_source: How the user was acquired (e.g. Organic, Email, Adwords, Facebook)
      created_at: Timestamp when the user registered
      user_geom: Geographic point geometry of the user's address
